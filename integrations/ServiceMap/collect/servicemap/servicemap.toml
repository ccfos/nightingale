# servicemap — 网络服务拓扑自动发现插件
# Network service topology auto-discovery plugin
#
# 通过 eBPF（Linux）或轮询回退模式（macOS/低版本内核）追踪 TCP 连接，
# 自动发现进程/容器间的通信关系，生成服务拓扑图指标。

 interval = 60

 [[instances]]
  ## TCP 连接追踪（核心功能，建议开启）
   enable_tcp = true


  ## ── 容器/进程发现 ──────────────────────────────────

  ## 通过 cgroup 发现容器化进程(k8s环境需设置为true)
  # enable_cgroup = false

  ## 通过 Docker API 获取容器元数据（名称、镜像、标签）
  # enable_docker = false
  # docker_socket = "/var/run/docker.sock"

  ## 通过本节点 kubelet /pods 获取 Pod/Namespace/Label 信息
  # enable_k8s = false
  # kubelet_host = ""
  # 支持从环境变量自动获取：$KUBERNETES_KUBELET_HOST 或 $KUBERNETES_SERVICE_HOST
  # kubelet_port = 10250
  # kubelet_pods_path = "/pods"
  # bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
  # use_tls = true
  # insecure_skip_verify = true
  # tls_ca = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
  # k8s_meta_refresh_seconds = 30
  # k8s_meta_timeout_seconds = 5

  ## ── 黑名单过滤 ────────────────────────────────────

  ## 忽略的目标 CIDR（匹配的连接事件将被丢弃）
  ## 典型用法：过滤 loopback 流量
  # ignore_cidrs = ["127.0.0.0/8"]

  ## 忽略的目标端口（如 SSH）
  # ignore_ports = [22]

  ## ── 资源限制 ──────────────────────────────────────

  ## 最大追踪连接数（默认 50000）
  # max_tracked_connections = 50000

  ## 最大容器/进程数（默认 5000）
  # max_containers = 5000

  ## ── 标签控制 ──────────────────────────────────────

  ## Docker label 白名单：仅透传此列表中的 label key 到 Prometheus 标签
  ## 留空则不透传任何 Docker label（推荐，避免高基数标签导致时序爆炸）
  # label_allowlist = []

  ## ── Debug API（仅调试用）───────────────────────────

  ## 启用内嵌 HTTP 服务（/graph、/graph/view、/metrics 等）
  ## 正常运行不需要开启，避免暴露额外端口
  # enable_debug_api = false
  # api_addr = ":9099"

  ## ── 实例标签 ──────────────────────────────────────
  # [instances.labels]
  #   cluster = "my-cluster"