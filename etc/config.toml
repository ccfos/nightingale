[Global]
RunMode = "release"

[Log]
# log write dir
Dir = "logs"
# log level: DEBUG INFO WARNING ERROR
Level = "DEBUG"
# stdout, stderr, file
Output = "stdout"
# # rotate by time
# KeepHours = 4
# # rotate by size
# RotateNum = 3
# # unit: MB
# RotateSize = 256

[HTTP]
# http listening address
Host = "0.0.0.0"
# http listening port
Port = 17000
# https cert file path
CertFile = ""
# https key file path
KeyFile = ""
# whether print access log
PrintAccessLog = false
# whether enable pprof
PProf = true
# expose prometheus /metrics?
ExposeMetrics = true
# http graceful shutdown timeout, unit: s
ShutdownTimeout = 30
# max content length: 64M
MaxContentLength = 67108864
# http server read timeout, unit: s
ReadTimeout = 20
# http server write timeout, unit: s
WriteTimeout = 40
# http server idle timeout, unit: s
IdleTimeout = 120

[HTTP.ShowCaptcha]
Enable = false

[HTTP.APIForAgent]
Enable = true
# [HTTP.APIForAgent.BasicAuth]
# user001 = "ccc26da7b9aba533cbb263a36c07dcc5"

[HTTP.APIForService]
Enable = false
[HTTP.APIForService.BasicAuth]
user001 = "ccc26da7b9aba533cbb263a36c07dcc5"

[HTTP.JWTAuth]
# unit: min
AccessExpired = 1500
# unit: min
RefreshExpired = 10080
RedisKeyPrefix = "/jwt/"

[HTTP.ProxyAuth]
# if proxy auth enabled, jwt auth is disabled
Enable = false
# username key in http proxy header
HeaderUserNameKey = "X-User-Name"
DefaultRoles = ["Standard"]

[HTTP.TokenAuth]
Enable = true

[HTTP.RSA]
# open RSA
OpenRSA = false

[DB]
# mysql postgres sqlite
DBType = "sqlite"
# postgres: host=%s port=%s user=%s dbname=%s password=%s sslmode=%s
# postgres: DSN="host=127.0.0.1 port=5432 user=root dbname=n9e_v6 password=1234 sslmode=disable"
# mysql: DSN="root:1234@tcp(localhost:3306)/n9e_v6?charset=utf8mb4&collation=utf8mb4_general_ci&parseTime=True&loc=Local"
DSN = "n9e.db"
# enable debug mode or not
Debug = false
# unit: s
MaxLifetime = 7200
# max open connections
MaxOpenConns = 150
# max idle connections
MaxIdleConns = 50

[Redis]
# address, ip:port or ip1:port,ip2:port for cluster and sentinel(SentinelAddrs)
Address = "127.0.0.1:6379"
# Username = ""
# Password = ""
# DB = 0
# UseTLS = false
# TLSMinVersion = "1.2"
# standalone cluster sentinel miniredis
RedisType = "miniredis"
# Mastername for sentinel type
# MasterName = "mymaster"
# SentinelUsername = ""
# SentinelPassword = ""

[Alert]
[Alert.Heartbeat]
# auto detect if blank
IP = ""
# unit ms
Interval = 1000
EngineName = "default"

# [Alert.Alerting]
# NotifyConcurrency = 10

[Center]
MetricsYamlFile = "./etc/metrics.yaml"
I18NHeaderKey = "X-Language"

[Center.AnonymousAccess]
PromQuerier = true
AlertDetail = true

# Sandbox isolates execution of user-uploaded Skill Python/Bash scripts.
# Disabled by default (executes untrusted code). On a capable Linux host set
# Enabled=true and (production) leave Engine="auto" + DevMode=false. On non-Linux
# / kernel-incapable hosts execution stays OFF unless DevMode=true picks the
# UNSAFE (no-isolation) engine — dev only, never production.
[Center.Sandbox]
Enabled = false
# auto | bubblewrap | confined | unsafe  (runsc/nsjail reserved for the future)
Engine = "auto"
# Egress preset — the one knob for skill outbound network (§10.1):
#   off       — no network. Most isolated.
#   open      — (default) skills reach public AND private (RFC1918/ULA) hosts
#               through the audited proxy, out of the box. ALWAYS blocked even in
#               open: host loopback (127.x) and cloud metadata / link-local
#               (169.254.x) — a skill must never hit n9e's own API/DB or steal
#               cloud credentials. UDP blocked; every call audited.
#   allowlist — reach only SkillPolicy.EgressAllowlist hosts; private blocked.
# Tighten to "allowlist" or "off" for stricter / multi-tenant deployments.
Egress = "open"
# Allow the unsafe engine when kernel capabilities are insufficient (dev only).
DevMode = false
# Explicitly accept the outer container as the host boundary so `auto` may use
# the container-confined engine when unprivileged userns is unavailable (§5.3).
ContainerAsBoundary = false
DataDir = "/var/lib/n9e/sandbox"
# audit | enforce  (first release may run audit to collect denied syscalls)
SeccompMode = "enforce"

[Center.Sandbox.Rootfs]
# embedded (base baked into the binary) | path (external base) | download
Source = "embedded"
Path = ""
ExtraLayers = []

# Default per-execution policy envelope. (Egress posture is set by Egress above.)
[Center.Sandbox.DefaultPolicy]
TimeoutSeconds = 30
MemoryMB = 256
CPUQuota = "100000 100000"
Pids = 32
StdoutBytes = 262144
StderrBytes = 262144

# Host-level admission control (caps total concurrent runs + memory budget).
[Center.Sandbox.Admission]
MaxConcurrent = 32
MaxTotalMemoryMB = 8192

# Per-skill ceilings (a skill cannot request beyond these).
[Center.Sandbox.Skill]
Enabled = true
MaxTimeoutSeconds = 300
MaxMemoryMB = 1024
MaxPids = 128
AllowedNetworkModes = ["none", "proxy"]

# Global skill policy envelope (§10/§12). All default-empty = no egress, no n9e
# API: a skill can reach nothing until an admin opts in here.
[Center.Sandbox.SkillPolicy]
# Used only when Egress = "allowlist": the specific hosts a skill may reach.
# Prefer exact hosts; "*.example.com" wildcards allowed but discouraged; "*" = all
# (which is what Egress = "open" does). Example:
#   EgressAllowlist = ["api.openai.com", "hooks.slack.com"]
EgressAllowlist = []
# n9e internal APIs the Skill Gateway may expose, as <domain>:<verb> grants
# (§12.2). Intersected with the launching user's own RBAC. Phase 1 ships read-only
# ops (list_alert_rules / list_datasources / list_targets / query_cur_events /
# whoami). Example:
#   GrantableN9eAPI = ["alert:read", "datasource:read", "target:read", "event:read"]
GrantableN9eAPI = []
JitConfirm = ["n9e_api:write", "network:new_domain", "network:direct"]

# Hard deny — no skill/layer can override (§16.3). The built-in SSRF floor
# (loopback + link-local/metadata) is ALWAYS blocked in code, in every mode.
# EgressCIDRs adds extra ranges to block in ALL proxy modes — use it to also block
# a sensitive internal subnet even under Egress = "open". Default empty.
[Center.Sandbox.Deny]
EgressCIDRs = []
N9eAPI = ["*:write", "*:delete", "user:*"]

# Host-side egress proxy transport knobs (§10.2/§10.3). Allowlist + deny CIDRs
# live above; this section is just the transport. TLS is tunneled, never
# decrypted (no CA to install).
[Center.Sandbox.EgressProxy]
# Also forward absolute-form plain HTTP (http://). false = HTTPS/CONNECT only.
AllowPlainHTTP = true
DialTimeoutSecs = 10
IdleTimeoutSecs = 120
# External n9e-sandbox-init forwarder path for non-embedded builds; the embedded
# one (-tags sandbox_embed) takes precedence. Build it with:
#   GOOS=linux GOARCH=<arch> CGO_ENABLED=0 go build ./cmd/n9e-sandbox-init
ForwarderPath = ""

[Pushgw]
# use target labels in database instead of in series
LabelRewrite = true
ForceUseServerTS = true

# [Pushgw.DebugSample]
# ident = "xx"
# __name__ = "xx"

# [Pushgw.WriterOpt]
# QueueMaxSize = 1000000
# QueuePopSize = 1000

[[Pushgw.Writers]] 
# Url = "http://127.0.0.1:8480/insert/0/prometheus/api/v1/write"
Url = "http://127.0.0.1:9090/api/v1/write"
# Basic auth username
BasicAuthUser = ""
# Basic auth password
BasicAuthPass = ""
# timeout settings, unit: ms
Headers = ["X-From", "n9e"]
Timeout = 10000
DialTimeout = 3000
TLSHandshakeTimeout = 30000
ExpectContinueTimeout = 1000
IdleConnTimeout = 90000
# time duration, unit: ms
KeepAlive = 30000
MaxConnsPerHost = 0
MaxIdleConns = 100
MaxIdleConnsPerHost = 100
## Optional TLS Config
# UseTLS = false
# TLSCA = "/etc/n9e/ca.pem"
# TLSCert = "/etc/n9e/cert.pem"
# TLSKey = "/etc/n9e/key.pem"
